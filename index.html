<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>검사판</title>
  
  <!-- React, ReactDOM, Babel, Tailwind CSS 불러오기 -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 아이콘 출력용 공통 컴포넌트
    const Icon = ({ name, size = 24, className = "" }) => {
      const props = { width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round", className };
      if (name === "CheckCircle2") return <svg {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
      if (name === "RotateCcw") return <svg {...props}><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>;
      if (name === "User") return <svg {...props}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>;
      if (name === "Check") return <svg {...props}><polyline points="20 6 9 17 4 12"></polyline></svg>;
      if (name === "Users") return <svg {...props}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>;
      if (name === "Edit") return <svg {...props}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>;
      if (name === "X") return <svg {...props}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
      if (name === "ArrowLeft") return <svg {...props}><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>;
      if (name === "Plus") return <svg {...props}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
      if (name === "Trash2") return <svg {...props}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
      if (name === "Settings") return <svg {...props}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>;
      if (name === "Undo2") return <svg {...props}><path d="M9 14 4 9l5-5"></path><path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5v0a5.5 5.5 0 0 1-5.5 5.5H11"></path></svg>;
      return null;
    };

    const INITIAL_STUDENTS = [];

    // 효과음 재생 함수
    const playSound = (type) => {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        if (type === 'complete') {
          oscillator.type = 'sine';
          oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
          oscillator.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
          gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
          oscillator.start(audioCtx.currentTime);
          oscillator.stop(audioCtx.currentTime + 0.3);
        } else if (type === 'recheck') {
          oscillator.type = 'triangle';
          oscillator.frequency.setValueAtTime(300, audioCtx.currentTime);
          oscillator.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.2);
          gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
          oscillator.start(audioCtx.currentTime);
          oscillator.stop(audioCtx.currentTime + 0.3);
        }
      } catch (e) {
        console.error("Audio playback failed:", e);
      }
    };

    function App() {
      const [studentList, setStudentList] = useState(() => {
        const saved = localStorage.getItem('mathCheckStudents');
        return saved ? JSON.parse(saved) : INITIAL_STUDENTS;
      });

      const [boards, setBoards] = useState(() => {
        const saved = localStorage.getItem('mathCheckBoards');
        return saved ? JSON.parse(saved) : [];
      });
      
      const [webhookUrl, setWebhookUrl] = useState(() => {
        return localStorage.getItem('mathCheckWebhook') || '';
      });

      const [activeBoardId, setActiveBoardId] = useState(null); 
      
      const [showInputModal, setShowInputModal] = useState(false);
      const [showSettingsModal, setShowSettingsModal] = useState(false);
      const [inputText, setInputText] = useState("");
      const [tempWebhookUrl, setTempWebhookUrl] = useState("");

      // 드래그 앤 드롭을 위한 Ref 상태
      const dragItem = useRef(null);
      const dragOverItem = useRef(null);

      useEffect(() => { localStorage.setItem('mathCheckStudents', JSON.stringify(studentList)); }, [studentList]);
      useEffect(() => { localStorage.setItem('mathCheckBoards', JSON.stringify(boards)); }, [boards]);
      useEffect(() => { localStorage.setItem('mathCheckWebhook', webhookUrl); }, [webhookUrl]);

      const sendToGoogleSheet = async (studentName, action) => {
        if (!webhookUrl) return;

        const activeBoard = boards.find(b => b.id === activeBoardId);
        const boardInfo = activeBoard ? `${activeBoard.date} / ${activeBoard.pageText} / ${activeBoard.contentText}` : '';
        const timeString = new Date().toLocaleTimeString('ko-KR');

        try {
          await fetch(webhookUrl, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({ studentName, action, time: timeString, boardInfo })
          });
        } catch (error) {
          console.error("구글 시트 전송 에러:", error);
        }
      };

      const updateBoard = (id, updates) => {
        setBoards(boards.map(b => b.id === id ? { ...b, ...updates } : b));
      };

      const handleAddBoard = () => {
        const newBoard = {
          id: Date.now().toString(),
          date: new Date().toISOString().split('T')[0],
          pageText: '', contentText: '',
          pending: [...studentList], waiting: [], completed: [], rechecked: []
        };
        setBoards([newBoard, ...boards]);
      };

      const handleDeleteBoard = (id, e) => {
        e.stopPropagation();
        setBoards(boards.filter(b => b.id !== id));
      };

      const handleSaveList = () => {
        const parsedNames = inputText.split(/[\n,]/).map(name => name.trim()).filter(name => name.length > 0);
        
        if (activeBoardId) {
          updateBoard(activeBoardId, { pending: parsedNames });
        } else {
          setStudentList(parsedNames); 
          setBoards(boards.map(board => {
            if (board.waiting.length === 0 && board.completed.length === 0 && (!board.rechecked || board.rechecked.length === 0)) {
              return { ...board, pending: parsedNames };
            }
            return board;
          }));
        }
        setShowInputModal(false);
      };

      const activeBoard = boards.find(b => b.id === activeBoardId);

      const moveToWaiting = (studentName, sourceList = 'pending') => {
        if (!activeBoard) return;
        const updates = { waiting: [...activeBoard.waiting, studentName] };
        
        if (sourceList === 'pending') {
          updates.pending = activeBoard.pending.filter(name => name !== studentName);
        } else if (sourceList === 'rechecked') {
          updates.rechecked = (activeBoard.rechecked || []).filter(name => name !== studentName);
        }
        updateBoard(activeBoardId, updates);
      };

      const markCompleted = (studentName) => {
        if (!activeBoard) return;
        updateBoard(activeBoardId, {
          waiting: activeBoard.waiting.filter(name => name !== studentName),
          completed: [...activeBoard.completed, studentName]
        });
        sendToGoogleSheet(studentName, 'COMPLETE');
        playSound('complete');
      };

      const markRecheck = (studentName) => {
        if (!activeBoard) return;
        updateBoard(activeBoardId, {
          waiting: activeBoard.waiting.filter(name => name !== studentName),
          rechecked: [...(activeBoard.rechecked || []), studentName]
        });
        sendToGoogleSheet(studentName, 'RECHECK');
        playSound('recheck');
      };

      const cancelWaiting = (studentName) => {
        if (!activeBoard) return;
        updateBoard(activeBoardId, {
          waiting: activeBoard.waiting.filter(name => name !== studentName),
          pending: [...activeBoard.pending, studentName]
        });
      };

      const cancelCompleted = (studentName) => {
        if (!activeBoard) return;
        updateBoard(activeBoardId, {
          completed: activeBoard.completed.filter(name => name !== studentName),
          waiting: [...activeBoard.waiting, studentName]
        });
      };

      // --- 드래그 앤 드롭 이벤트 핸들러 ---
      const handleDragStart = (e, index) => {
        dragItem.current = index;
        // 드래그 중인 아이템의 시각적 효과 (반투명)
        setTimeout(() => {
          e.target.style.opacity = '0.4';
        }, 0);
      };

      const handleDragEnter = (e, index) => {
        dragOverItem.current = index;
        // 드래그 중에 실시간으로 순서 변경하기
        if (dragItem.current !== null && dragItem.current !== index && activeBoard) {
          const newWaiting = [...activeBoard.waiting];
          const draggedItemContent = newWaiting.splice(dragItem.current, 1)[0];
          newWaiting.splice(dragOverItem.current, 0, draggedItemContent);
          dragItem.current = index; // 인덱스 업데이트
          updateBoard(activeBoardId, { waiting: newWaiting });
        }
      };

      const handleDragEnd = (e) => {
        e.target.style.opacity = '1';
        dragItem.current = null;
        dragOverItem.current = null;
      };

      const handleDragOver = (e) => {
        e.preventDefault(); // 드롭을 허용하기 위해 기본 이벤트 방지
      };

      if (!activeBoardId) {
        return (
          <div className="min-h-screen bg-slate-50 p-4 font-sans flex flex-col items-center pt-10">
            <div className="max-w-5xl w-full space-y-6">
              <header className="text-center mb-8 relative">
                <h1 className="text-4xl font-bold text-slate-800">📖 검사판</h1>
                <p className="text-slate-500 mt-2">아래 카드를 클릭하여 검사를 진행하거나 새 검사를 추가하세요.</p>
                <button 
                  onClick={() => { setTempWebhookUrl(webhookUrl); setShowSettingsModal(true); }}
                  className="absolute top-0 right-0 p-2 text-slate-400 hover:text-slate-700 transition-colors"
                  title="구글 시트 연동 설정"
                >
                  <Icon name="Settings" size={28} />
                </button>
              </header>

              <div className="flex justify-end w-full gap-3">
                <button 
                  onClick={() => { setInputText(studentList.join('\n')); setShowInputModal(true); }}
                  className="flex items-center gap-2 bg-slate-100 hover:bg-slate-200 text-slate-700 px-5 py-2.5 rounded-xl font-bold shadow-sm transition-all transform hover:-translate-y-0.5"
                >
                  <Icon name="Edit" size={20} /> 기본 명단 입력
                </button>
                <button 
                  onClick={handleAddBoard}
                  className="flex items-center gap-2 bg-blue-500 hover:bg-blue-600 text-white px-5 py-2.5 rounded-xl font-bold shadow-sm transition-all transform hover:-translate-y-0.5"
                >
                  <Icon name="Plus" size={20} /> 검사 추가하기
                </button>
              </div>

              <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-5">
                {boards.length === 0 && (
                  <div className="col-span-full text-center py-10 text-slate-400">
                    생성된 검사 대기판이 없습니다. '검사 추가하기'를 눌러주세요.
                  </div>
                )}
                {boards.map(board => {
                  const uncompletedCount = board.pending.length + board.waiting.length + (board.rechecked?.length || 0);
                  return (
                    <div key={board.id} onClick={() => setActiveBoardId(board.id)} className="bg-white rounded-2xl shadow-sm p-6 border-2 border-slate-200 hover:border-blue-400 hover:shadow-md transition-all cursor-pointer group relative flex flex-col h-48">
                      <button onClick={(e) => handleDeleteBoard(board.id, e)} className="absolute top-4 right-4 text-slate-300 hover:text-red-500 transition-colors hidden md:block opacity-0 group-hover:opacity-100 p-1">
                        <Icon name="Trash2" size={18} />
                      </button>
                      <button onClick={(e) => handleDeleteBoard(board.id, e)} className="absolute top-4 right-4 text-slate-300 hover:text-red-500 md:hidden p-1">
                        <Icon name="Trash2" size={18} />
                      </button>
                      <div className="text-sm font-medium text-blue-500 mb-2">{board.date || '날짜 없음'}</div>
                      <h2 className="text-xl font-bold text-slate-800 group-hover:text-blue-600 transition-colors line-clamp-1 pr-6">{board.pageText || "페이지 미지정"}</h2>
                      <p className="text-slate-500 text-sm mt-1 line-clamp-1 mb-auto">{board.contentText || "내용 미지정"}</p>
                      <div className="mt-4 pt-4 border-t border-slate-100 flex justify-between items-center">
                        <span className="text-sm font-semibold flex items-center gap-1 text-slate-600"><Icon name="Users" size={16} /> 미완료</span>
                        <div className="bg-red-50 text-red-600 px-3 py-1 rounded-lg font-bold">{uncompletedCount}명</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* 설정 모달 */}
            {showSettingsModal && (
              <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                <div className="bg-white rounded-2xl shadow-xl p-6 w-full max-w-lg">
                  <div className="flex justify-between items-center mb-4">
                    <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2"><Icon name="Settings" size={20}/>구글 시트 자동 연동</h3>
                    <button onClick={() => setShowSettingsModal(false)} className="text-slate-400 hover:text-slate-600"><Icon name="X" size={24} /></button>
                  </div>
                  <p className="text-sm text-slate-600 mb-4 bg-blue-50 p-3 rounded-lg">
                    구글 Apps Script에서 발급받은 <b>웹앱 URL</b>을 아래에 붙여넣으세요.<br/>
                    설정해두면 '완료/재검사' 버튼을 누를 때마다 백그라운드에서 시트에 기록됩니다.
                  </p>
                  <input type="text" value={tempWebhookUrl} onChange={(e) => setTempWebhookUrl(e.target.value)} className="w-full border border-slate-300 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="https://script.google.com/macros/s/.../exec" />
                  <div className="mt-6 flex justify-end gap-3">
                    <button onClick={() => setShowSettingsModal(false)} className="px-4 py-2 bg-slate-100 text-slate-700 rounded-lg font-medium">취소</button>
                    <button onClick={() => { setWebhookUrl(tempWebhookUrl); setShowSettingsModal(false); alert("저장되었습니다."); }} className="px-4 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded-lg font-medium">저장</button>
                  </div>
                </div>
              </div>
            )}

            {/* 명단 입력 모달 */}
            {showInputModal && (
              <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                <div className="bg-white rounded-2xl shadow-xl p-6 w-full max-w-md">
                  <div className="flex justify-between items-center mb-4">
                    <h3 className="text-xl font-bold text-slate-800">명단 직접 입력</h3>
                    <button onClick={() => setShowInputModal(false)} className="text-slate-400 hover:text-slate-600"><Icon name="X" size={24} /></button>
                  </div>
                  <textarea value={inputText} onChange={(e) => setInputText(e.target.value)} className="w-full h-48 border border-slate-300 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none" placeholder="예시:&#13;&#10;1. 김민준&#13;&#10;2. 이서윤&#13;&#10;3. 박도윤" />
                  <div className="mt-6 flex justify-end gap-3">
                    <button onClick={() => setShowInputModal(false)} className="px-4 py-2 bg-slate-100 text-slate-700 rounded-lg">취소</button>
                    <button onClick={handleSaveList} className="px-4 py-2 bg-blue-500 text-white rounded-lg">저장</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-slate-50 p-4 font-sans flex flex-col items-center">
          <div className="max-w-4xl w-full space-y-6">
            <header className="bg-white rounded-2xl shadow-sm p-6 text-center border border-slate-200 flex flex-col items-center relative">
              <button onClick={() => setActiveBoardId(null)} className="absolute left-6 top-6 flex items-center gap-2 text-slate-500 hover:text-blue-600 font-medium">
                <Icon name="ArrowLeft" size={20} /><span className="hidden md:inline">메인으로</span>
              </button>
              <h1 className="text-3xl font-bold text-slate-800 mt-8 md:mt-0">📖 검사판</h1>
              <div className="w-full max-w-2xl mt-5 mb-2 flex flex-col md:flex-row gap-3">
                <input type="date" value={activeBoard.date} onChange={(e) => updateBoard(activeBoard.id, { date: e.target.value })} className="px-4 py-2 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 text-center" />
                <input type="text" placeholder="쪽수 (예: 10~11쪽)" value={activeBoard.pageText} onChange={(e) => updateBoard(activeBoard.id, { pageText: e.target.value })} className="flex-1 px-4 py-2 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 text-center md:text-left" />
                <input type="text" placeholder="학습 내용 (예: 덧셈과 뺄셈)" value={activeBoard.contentText} onChange={(e) => updateBoard(activeBoard.id, { contentText: e.target.value })} className="flex-[1.5] px-4 py-2 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 text-center md:text-left" />
              </div>
              <p className="text-slate-500 mt-2">학생은 아래에서 이름을 클릭하고, 선생님은 대기판에서 검사를 진행해 주세요.</p>
            </header>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
              <section className="bg-white rounded-2xl shadow-sm border border-blue-100 overflow-hidden flex flex-col h-[400px]">
                <div className="bg-blue-500 p-4 flex justify-between items-center text-white">
                  <h2 className="text-xl font-bold flex items-center gap-2"><Icon name="Users" size={24} />검사 대기판</h2>
                  <span className="bg-blue-600 px-3 py-1 rounded-full text-sm font-semibold">대기 {activeBoard.waiting.length}명</span>
                </div>
                <div className="p-4 flex-1 overflow-y-auto bg-slate-50/50">
                  {activeBoard.waiting.length === 0 ? (
                    <div className="h-full flex flex-col items-center justify-center text-slate-400">
                      <Icon name="User" size={48} className="mb-4 opacity-50" /><p>대기 중인 학생이 없습니다.</p>
                    </div>
                  ) : (
                    <div className="space-y-3">
                      {activeBoard.waiting.map((student, index) => (
                        <div 
                          key={student} 
                          draggable
                          onDragStart={(e) => handleDragStart(e, index)}
                          onDragEnter={(e) => handleDragEnter(e, index)}
                          onDragEnd={handleDragEnd}
                          onDragOver={handleDragOver}
                          title="마우스로 꾹 눌러서 순서를 바꿀 수 있습니다."
                          className={`flex items-center justify-between p-4 rounded-xl shadow-sm border cursor-grab active:cursor-grabbing transition-all ${index === 0 ? 'bg-yellow-50 border-yellow-200' : 'bg-white border-slate-200'}`}
                        >
                          <div className="flex items-center gap-3">
                            <span className={`flex items-center justify-center w-8 h-8 rounded-full font-bold text-sm ${index === 0 ? 'bg-yellow-400 text-yellow-900' : 'bg-slate-100 text-slate-500'}`}>{index + 1}</span>
                            <span className="text-lg font-medium text-slate-800">{student}</span>
                          </div>
                          <div className="flex gap-2">
                            <button onClick={() => cancelWaiting(student)} className="flex items-center gap-1 bg-slate-200 hover:bg-slate-300 text-slate-700 px-3 py-2 rounded-lg text-sm font-medium"><Icon name="Undo2" size={16} />취소</button>
                            <button onClick={() => markCompleted(student)} className="flex items-center gap-1 bg-green-500 hover:bg-green-600 text-white px-3 py-2 rounded-lg text-sm font-medium"><Icon name="Check" size={16} />완료</button>
                            <button onClick={() => markRecheck(student)} className="flex items-center gap-1 bg-red-400 hover:bg-red-500 text-white px-3 py-2 rounded-lg text-sm font-medium"><Icon name="RotateCcw" size={16} />재검사</button>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </section>

              <section className="bg-white rounded-2xl shadow-sm border border-green-100 overflow-hidden flex flex-col h-[400px]">
                <div className="bg-green-500 p-4 flex justify-between items-center text-white">
                  <h2 className="text-xl font-bold flex items-center gap-2"><Icon name="CheckCircle2" size={24} />검사 완료</h2>
                  <span className="bg-green-600 px-3 py-1 rounded-full text-sm font-semibold">완료 {activeBoard.completed.length}명</span>
                </div>
                <div className="p-4 flex-1 overflow-y-auto">
                  {activeBoard.completed.length === 0 ? (
                    <div className="h-full flex items-center justify-center text-slate-400"><p>아직 검사를 완료한 학생이 없습니다.</p></div>
                  ) : (
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                      {activeBoard.completed.map((student, index) => (
                        <div key={student} className="bg-green-50 text-green-800 px-4 py-3 rounded-lg border border-green-200 flex justify-between items-center gap-2">
                          <div className="flex items-center gap-2">
                            <span className="font-bold text-sm bg-white text-green-600 rounded-full w-8 h-8 flex items-center justify-center shadow-sm">{index + 1}등</span>
                            <span className="font-medium">{student}</span>
                          </div>
                          <button onClick={() => cancelCompleted(student)} className="text-green-600 hover:text-green-800 bg-green-100 hover:bg-green-200 p-1.5 rounded-md transition-colors" title="대기판으로 되돌리기">
                            <Icon name="Undo2" size={16} />
                          </button>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </section>
            </div>

            <section className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
              <div className="bg-slate-700 p-4 text-white flex justify-between items-center">
                <h2 className="text-xl font-bold flex items-center gap-2">👇 학생명단</h2>
                <button onClick={() => { setInputText(activeBoard.pending.join('\n')); setShowInputModal(true); }} className="flex items-center gap-1 bg-slate-600 hover:bg-slate-500 text-white px-3 py-1.5 rounded-lg text-sm font-medium transition-colors">
                  <Icon name="Edit" size={16} /> 미검사 명단 편집
                </button>
              </div>
              <div className="p-6 bg-slate-50 grid grid-cols-1 md:grid-cols-2 gap-8 divide-y md:divide-y-0 md:divide-x divide-slate-200">
                <div className="pt-4 md:pt-0 md:pr-4">
                  <h3 className="text-lg font-bold text-slate-600 mb-4 flex items-center gap-2"><Icon name="User" size={20} /> 미검사</h3>
                  <div className="flex flex-wrap gap-3">
                    {activeBoard.pending.map((student) => (
                      <button key={student} onClick={() => moveToWaiting(student, 'pending')} className="bg-white border-2 border-slate-200 hover:border-blue-400 text-slate-700 font-medium text-lg px-5 py-3 rounded-xl shadow-sm transition-all transform hover:-translate-y-1">
                        {student}
                      </button>
                    ))}
                    {activeBoard.pending.length === 0 && <p className="text-slate-400 text-sm py-4">미검사 학생이 없습니다.</p>}
                  </div>
                </div>

                <div className="pt-8 md:pt-0 md:pl-8">
                  <h3 className="text-lg font-bold text-red-500 mb-4 flex items-center gap-2"><Icon name="RotateCcw" size={20} /> 재검사</h3>
                  <div className="flex flex-wrap gap-3">
                    {(activeBoard.rechecked || []).map((student) => (
                      <button key={student} onClick={() => moveToWaiting(student, 'rechecked')} className="bg-red-50 border-2 border-red-200 hover:border-red-400 text-red-700 font-medium text-lg px-5 py-3 rounded-xl shadow-sm transition-all transform hover:-translate-y-1">
                        {student}
                      </button>
                    ))}
                    {(!activeBoard.rechecked || activeBoard.rechecked.length === 0) && <p className="text-slate-400 text-sm py-4">재검사 학생이 없습니다.</p>}
                  </div>
                </div>
              </div>
            </section>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
